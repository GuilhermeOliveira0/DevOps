# Banco PostgreSQL. Ajuste DB_URL, DB_USERNAME e DB_PASSWORD por variaveis de ambiente.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fatecads_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Atualizacao automatica mantida para simplicidade do projeto academico.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
