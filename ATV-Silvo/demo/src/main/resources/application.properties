spring.application.name=demo

# Perfil padrao. Use SPRING_PROFILES_ACTIVE=h2 para rodar com banco local em arquivo.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# Hibernate atualiza as tabelas automaticamente para facilitar o projeto academico.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

server.port=${SERVER_PORT:8082}

# Configuracoes do link enviado na recuperacao de senha.
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.mail.from=${APP_MAIL_FROM:${SMTP_USERNAME:no-reply@fatecads.local}}

# SMTP configurado por variaveis de ambiente. Nunca salve senha real neste arquivo.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
