<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatecADS</title>
    <link rel="stylesheet" href="/css/app.css?v=20260530ui">
</head>
<body class="auth-page">
    <main class="auth-shell auth-shell-centered">
        <section class="panel auth-center-card">
            <div class="auth-center-head">
                <div class="landing-brand landing-brand-centered">
                    <span class="landing-brand-mark"></span>
                    <span class="landing-brand-copy">
                        <strong>FatecADS</strong>
                        <span>Sistema academico</span>
                    </span>
                </div>
                <p class="section-kicker">Bem-vindo</p>
                <h1>Bem-vindo</h1>
                <p class="section-copy auth-center-copy">Acesse o sistema com seu email e senha. Se ainda nao tiver conta, use o cadastro para solicitar seu acesso.</p>
            </div>

            <section class="auth-panel auth-panel-centered">
                <div class="panel-header auth-panel-header auth-panel-header-centered">
                    <div class="panel-title-stack">
                        <span class="panel-eyebrow">Acesso</span>
                        <h2>Entrar no sistema</h2>
                    </div>
                </div>

                <form action="/login" method="post" class="auth-form">
                    <div class="field">
                        <label for="username">Email</label>
                        <input type="email" id="username" name="username" required>
                    </div>
                    <div class="field">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="button button-full">Entrar</button>
                </form>

                <div class="auth-links auth-links-centered">
                    <span>Ainda nao tem conta?</span>
                    <a href="/usuarios/criar">Criar cadastro</a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
