<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>
</head>
<body>
    <h1 th:text="${curso.idCurso != 0} ? 'Editar Curso' : 'Cadastro de Cursos'">Cadastro de Cursos</h1>
    <form action="#" th:action="@{/cursos/salvar}" th:object="${curso}" method="post">
        <input type="hidden" th:field="*{idCurso}">

        <label for="nome">Nome do curso:</label>
        <input type="text" id="nome" th:field="*{nomeCurso}" required><br><br>

        <label for="periodo">Periodo:</label>
        <input type="text" id="periodo" th:field="*{periodoCurso}" required><br><br>

        <label for="cargaHoraria">Carga horaria:</label>
        <input type="number" id="cargaHoraria" th:field="*{cargaHorariaCurso}" min="1" required><br><br>

        <button type="submit">Salvar</button>
    </form>

    <p><a href="/cursos/listar">Voltar para lista</a></p>
</body>
</html>
