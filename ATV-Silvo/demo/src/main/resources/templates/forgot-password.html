<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar senha - FatecADS</title>
    <link rel="stylesheet" href="/css/app.css?v=20260518d">
</head>
<body class="auth-page">
    <main class="auth-shell auth-shell-centered">
        <section class="panel auth-center-card">
            <div class="auth-center-head">
                <div class="landing-brand landing-brand-centered">
                    <span class="landing-brand-mark"></span>
                    <span class="landing-brand-copy">
                        <strong>FatecADS</strong>
                        <span>Sistema academico</span>
                    </span>
                </div>
                <p class="section-kicker">Recuperacao</p>
                <h1>Recuperar senha</h1>
                <p class="section-copy auth-center-copy">Informe o email usado no login para receber as instrucoes.</p>
            </div>

            <section class="auth-panel auth-panel-centered">
                <div class="panel-header auth-panel-header auth-panel-header-centered">
                    <div class="panel-title-stack">
                        <span class="panel-eyebrow">Senha</span>
                        <h2>Enviar link</h2>
                    </div>
                </div>

                <form th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" class="auth-form">
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" maxlength="40" required>
                        <span class="field-hint" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erro no email</span>
                    </div>
                    <button type="submit" class="button button-full">Enviar instrucoes</button>
                </form>

                <p class="auth-alert auth-alert-success" th:if="${successMessage}" th:text="${successMessage}">
                    Se o email estiver cadastrado, enviaremos instrucoes para redefinir sua senha.
                </p>

                <div class="auth-links auth-links-centered auth-links-stack">
                    <a href="/login">Voltar para login</a>
                    <a href="/usuarios/criar">Criar cadastro</a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
