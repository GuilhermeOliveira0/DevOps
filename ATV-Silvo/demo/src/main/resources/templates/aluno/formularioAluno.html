<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
</head>
<body>
    <h1 th:text="${aluno.idAluno != 0} ? 'Editar Aluno' : 'Cadastro de Alunos'">Cadastro de Alunos</h1>
    <form action="#" th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
        <input type="hidden" th:field="*{idAluno}">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nomeAluno}" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{emailAluno}" required><br><br>
        
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" th:field="*{telefoneAluno}" required><br><br>

        <label for="endereco">Endereco:</label>
        <input type="text" id="endereco" th:field="*{enderecoAluno}" required><br><br>
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" th:field="*{cpfAluno}" required><br><br>

        <label for="ra">RA:</label>
        <input type="text" id="ra" th:field="*{raAluno}" required><br><br>

        <button type="submit">Salvar</button>
    </form>

    <p><a href="/alunos/listar">Voltar para lista</a></p>
</body>
</html>
