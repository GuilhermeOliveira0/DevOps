<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <main class="page-shell layout-stack">
        <section class="hero">
            <div class="topbar">
                <div class="brand">
                    <span class="brand-mark"></span>
                    <span>FatecADS</span>
                </div>
                <div class="topbar-links">
                    <a class="nav-pill" href="/">Inicio</a>
                    <a class="nav-pill active" href="/alunos/listar">Alunos</a>
                    <a class="nav-pill" href="/cursos/listar">Cursos</a>
                </div>
            </div>

            <div class="section-head">
                <span class="eyebrow">Formulario</span>
                <h1 th:text="${aluno.idAluno != 0} ? 'Editar aluno' : 'Cadastrar aluno'">Cadastro de Alunos</h1>
                <p>Preencha os campos abaixo para manter o cadastro academico organizado e padronizado.</p>
            </div>
        </section>

        <section class="form-panel">
            <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
                <input type="hidden" th:field="*{idAluno}">

                <div class="form-grid">
                    <div class="field field-full">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nomeAluno}" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{emailAluno}" required>
                    </div>

                    <div class="field">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" th:field="*{telefoneAluno}" required>
                    </div>

                    <div class="field field-full">
                        <label for="endereco">Endereco</label>
                        <input type="text" id="endereco" th:field="*{enderecoAluno}" required>
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" th:field="*{cpfAluno}" required>
                    </div>

                    <div class="field">
                        <label for="ra">RA</label>
                        <input type="text" id="ra" th:field="*{raAluno}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="button" type="submit">Salvar aluno</button>
                    <a class="button-ghost" href="/alunos/listar">Voltar para lista</a>
                </div>
            </form>

            <p class="panel-note">Os dados sao mantidos no banco configurado pela aplicacao e podem ser atualizados a qualquer momento.</p>
        </section>
    </main>
</body>
</html>
